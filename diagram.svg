  <!-- == punchline ==================================================== -->
  <text x="440" y="336" font-size="16">NZ Monday 9am plays at your Monday 9am</text>
  <path d="M 352 344 C 388 340, 428 346, 468 342 C 494 345, 517 341, 532 343"/>
</svg>
