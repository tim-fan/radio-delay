  <path d="M 358 230 C 388 224, 418 222, 448 216"/>
  <path d="M 439 211 C 442 213, 445 215, 448 216 C 444 218, 441 220, 439 223"/>
  <text x="400" y="247" class="small">aws s3 sync</text>

  <!-- == R2 cloud ===================================================== -->
  <path d="M 466 232
           C 448 230, 438 216, 444 203
